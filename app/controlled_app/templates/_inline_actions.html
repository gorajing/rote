<form action="{{ url_for('invoice_dispute', invoice_id=inv.id) }}" method="POST" style="display:inline">
  <button type="submit" class="btn btn-dispute" id="btn-dispute-{{ inv.id }}">Mark Disputed</button>
</form>
<a href="{{ url_for('invoice_note', invoice_id=inv.id) }}" class="btn btn-note" id="btn-note-{{ inv.id }}">Add Note</a>
<form action="{{ url_for('invoice_export', invoice_id=inv.id) }}" method="POST" style="display:inline">
  <button type="submit" class="btn btn-export" id="btn-export-{{ inv.id }}">{{ export_label }}</button>
</form>
<form action="{{ url_for('invoice_refund', invoice_id=inv.id) }}" method="POST" style="display:inline">
  <button type="submit" class="btn btn-refund" id="btn-refund-{{ inv.id }}">Refund</button>
</form>
